program: tiny_adder.py
name: tiny-adder-split-sub200
method: bayes
metric:
  name: best_val_exact
  goal: maximize
early_terminate:
  type: hyperband
  min_iter: 120000

parameters:
  seed:
    values: [34, 42, 43, 44]

  arch:
    values: ["split"]
  n_layer:
    values: [1]
  d_model:
    values: [6]
  d_ff:
    values: [2, 1]
  use_rmsnorm:
    values: [true]

  split_tok_dim:
    values: [3]
  split_pos_dim:
    values: [3]
  split_n_head:
    values: [2]
  split_head_dim:
    values: [3]
  split_tie_qk:
    values: [false, true]
  split_ffn_bias:
    values: [true]
  split_spiral_init:
    values: [true]
  split_pos_kind:
    values: ["fixed_shared_sincos"]
  prompt_order:
    values: ["lsd"]

  # fixed for parser compatibility; unused in split arch.
  n_head:
    values: [1]
  pe_kind:
    values: ["learned"]
  pe_period:
    values: [11.0]
  pos_rank:
    values: [3]
  qkv_rank:
    values: [3]
  attn_out_rank:
    values: [3]
  ffn_rank:
    values: [3]
  tie_qkv:
    values: ["shareA_tieKV"]

  curriculum_mode:
    values: ["absolute"]
  phase1_end:
    values: [2000]
  phase2_end:
    values: [7000]
  steps:
    values: [512000]
  batch_size:
    values: [512]
  lr:
    distribution: log_uniform_values
    min: 0.0040
    max: 0.0062
  min_lr_ratio:
    values: [0.1]
  warmup_steps:
    values: [2000]
  weight_decay:
    values: [0.01, 0.02]
  grad_clip:
    values: [1.0]
  eval_interval:
    values: [2000]
  eval_batch_size:
    values: [512]
  val_size:
    values: [5000]
  test_size:
    values: [10000]
  holdout_seed:
    values: [2025]
  max_params:
    values: [200]

command:
  - .venv/bin/python
  - ${program}
  - sweep
  - --project
  - tiny-adder-lab
  - --group
  - split-sub200
  - --device
  - cuda
  - --output-root
  - runs/wandb
  - --tags
  - tiny,adder,split,sub200
