program: tiny_adder.py
name: tiny-adder-sub512-search
method: bayes
metric:
  name: best_val_token_acc
  goal: maximize
early_terminate:
  type: hyperband
  min_iter: 120000

parameters:
  seed:
    values: [34, 42, 43, 44]
  n_layer:
    values: [1]
  d_model:
    values: [4, 5, 6, 7]
  n_head:
    values: [1]
  d_ff:
    values: [8, 10, 12, 14]
  tie_qkv:
    values: ["shareA_tieKV"]
  use_rmsnorm:
    values: [true]
  pos_rank:
    values: [2, 3]
  qkv_rank:
    values: [2, 3]
  attn_out_rank:
    values: [2, 3]
  ffn_rank:
    values: [2, 3]
  curriculum_mode:
    values: ["absolute"]
  phase1_end:
    values: [2000]
  phase2_end:
    values: [7000]
  steps:
    values: [256000, 512000]
  batch_size:
    values: [512]
  lr:
    distribution: log_uniform_values
    min: 0.015
    max: 0.024
  min_lr_ratio:
    values: [0.08, 0.1]
  warmup_steps:
    values: [2000]
  weight_decay:
    values: [0.003, 0.01]
  grad_clip:
    values: [1.0]
  eval_interval:
    values: [2000]
  eval_batch_size:
    values: [512]
  val_size:
    values: [5000]
  test_size:
    values: [10000]
  holdout_seed:
    values: [2025]
  max_params:
    values: [512]

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - sweep
  - --project
  - tiny-adder-lab
  - --group
  - sub512-search
  - --device
  - cuda
  - --output-root
  - runs/wandb
  - --tags
  - tiny,adder,sub512,search
