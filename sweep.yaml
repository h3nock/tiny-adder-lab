program: tiny_adder.py
name: tiny-adder-arch-multiseed
method: bayes
metric:
  name: best_val_exact
  goal: maximize

parameters:
  seed:
    values: [9, 34, 42]
  n_layer:
    values: [1]
  d_model:
    values: [3, 4, 5, 6, 7]
  n_head:
    values: [1]
  d_ff:
    values: [6, 8, 10, 12, 14]
  tie_qkv:
    values: ["shareA_tieKV"]
  use_rmsnorm:
    values: [true]
  pos_rank:
    values: [1, 2, 3]
  qkv_rank:
    values: [1, 2, 3]
  attn_out_rank:
    values: [1, 2, 3]
  ffn_rank:
    values: [1, 2, 3]
  curriculum_mode:
    values: ["absolute"]
  phase1_end:
    values: [2000, 4000]
  phase2_end:
    values: [7000, 14000]
  steps:
    values: [256000, 512000]
  batch_size:
    values: [512]
  lr:
    distribution: log_uniform_values
    min: 0.01
    max: 0.03
  min_lr_ratio:
    values: [0.1]
  warmup_steps:
    values: [1350]
  weight_decay:
    values: [0.01]
  grad_clip:
    values: [1.0]
  eval_interval:
    values: [4000]
  eval_batch_size:
    values: [512]
  val_size:
    values: [5000]
  test_size:
    values: [10000]
  holdout_seed:
    values: [2025]
  max_params:
    values: [512]

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - sweep
  - --project
  - tiny-adder-lab
  - --group
  - arch-multiseed
  - --device
  - cuda
  - --output-root
  - runs/wandb
  - --tags
  - tiny,adder,arch,multiseed
